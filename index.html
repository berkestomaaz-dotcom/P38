<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P38 Holographic HUD v8</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #040814; /* Mélykék/fekete tech háttér */
            font-family: 'Courier New', Courier, monospace;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* CRT monitor és finom scifi zaj overlay */
        #crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(0, 255, 255, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            background-size: 100% 3px;
            pointer-events: none;
            z-index: 20;
            opacity: 0.6;
        }

        /* FIX HUD CÉLKERESZT A KÉPERNYŐ KÖZEPÉN */
        #hud-crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            border: 1px dashed rgba(0, 255, 255, 0.25);
            border-radius: 50%;
        }
        #hud-crosshair::before, #hud-crosshair::after {
            content: '';
            position: absolute;
            background: rgba(0, 255, 255, 0.4);
        }
        #hud-crosshair::before { top: 50%; left: -10px; width: 120px; height: 1px; } /* Vízszintes szál */
        #hud-crosshair::after { left: 50%; top: -10px; width: 1px; height: 120px; } /* Függőleges szál */

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            box-sizing: border-box;
            z-index: 10;
        }
        
        /* HIGH-TECH HUD PANEL GRAPHICS */
        #telemetry {
            display: flex;
            justify-content: space-between;
            width: 100%;
            color: #00ffff;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.7);
        }
        .angle-box {
            background: rgba(4, 12, 32, 0.6);
            padding: 12px 20px;
            border: 1px solid #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            position: relative;
        }
        /* Sarokdíszek a tech dobozoknak */
        .angle-box::before {
            content: ''; position: absolute; top: -3px; left: -3px; width: 8px; height: 8px; border-top: 3px solid #00ffff; border-left: 3px solid #00ffff;
        }
        .angle-box::after {
            content: ''; position: absolute; bottom: -3px; right: -3px; width: 8px; height: 8px; border-bottom: 3px solid #00ffff; border-right: 3px solid #00ffff;
        }

        .btn {
            background: rgba(4, 12, 32, 0.8);
            color: #00ffff;
            border: 1px solid #00ffff;
            padding: 15px 40px;
            font-size: 14px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            transition: all 0.2s ease;
            align-self: center;
            letter-spacing: 3px;
        }
        .btn:active {
            transform: scale(0.95);
            background: #00ffff;
            color: #040814;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
        }
        #sys-status {
            color: rgba(0, 255, 255, 0.5);
            font-size: 11px;
            text-align: center;
            margin-top: 5px;
            letter-spacing: 1px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="crt-overlay"></div>
    <div id="hud-crosshair"></div>
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="telemetry">
            <div class="angle-box">HUD.P38_ROLL // <span id="val-roll">0</span>°</div>
            <div class="angle-box">HUD.P38_PITCH // <span id="val-pitch">0</span>°</div>
        </div>

        <div style="display: flex; flex-direction: column; align-self: center;">
            <button id="start-btn" class="btn">ENGAGE HUD SYSTEM</button>
            <div id="sys-status">GRID_STATUS: ACTIVE // MODEL_RENDER: LOADING_P38_GLB...</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, carModel, controls, linearGrid, radarGrid;
        let basePitch = 0, baseRoll = 0;
        let currentPitch = 0, currentRoll = 0;
        let isCalibrated = false;
        const driveSpeed = 0.12; 

        function init3D() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x040814);
            scene.fog = new THREE.FogExp2(0x040814, 0.08);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(3.5, 2.2, 5.5); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // GESTURE CONTROL (Ujjas forgatás és zoom)
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 3;
            controls.maxDistance = 12;
            controls.maxPolarAngle = Math.PI / 2 - 0.02; 
            controls.target.set(0, 0.4, 0);

            // Lineáris futóút a háttérben (nagyon halvány kék vektorvonalak)
            linearGrid = new THREE.GridHelper(100, 60, 0x00ffff, 0x002244);
            linearGrid.position.y = -0.5;
            linearGrid.material.opacity = 0.2;
            linearGrid.material.transparent = true;
            scene.add(linearGrid);

            // Fő csoport létrehozása, ami a dőléseket és a radargyűrűt összefogja
            carModel = new THREE.Group();

            // HOLOGRAM RADAR-GYŰRŰ AZ AUTÓ ALATT
            radarGrid = new THREE.PolarGridHelper(2.3, 4, 8, 32, 0x00ffff, 0x004466);
            radarGrid.position.y = -0.4; 
            radarGrid.material.transparent = true;
            radarGrid.material.opacity = 0.6;
            carModel.add(radarGrid);

            // ====================================================
            // GLB MODELL BETÖLTÉSE ÉS HOLOGRAMMÁ ALAKÍTÁSA
            // ====================================================
            const loader = new THREE.GLTFLoader();
            loader.load('Range Rover P38.glb', function (gltf) {
                const importedScene = gltf.scene;

                // Végigmegyünk a modell összes elemén, és átírjuk a külsejét neon drótvázzá
                importedScene.traverse(function (child) {
                    if (child.isMesh) {
                        child.material = new THREE.MeshBasicMaterial({
                            color: 0x00ffff,
                            wireframe: true,
                            transparent: true,
                            opacity: 0.75
                        });
                    }
                });

                // Automatikus méretezés és középre igazítás (Befoglaló doboz alapján)
                const box = new THREE.Box3().setFromObject(importedScene);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());

                // Modell középpontjának nullázása a forgástengelyhez
                importedScene.position.x = -center.x;
                importedScene.position.y = -box.min.y - 0.4; // Az alja finoman illeszkedjen a radargyűrűhöz
                importedScene.position.z = -center.z;

                // Skálázás, hogy arányos maradjon a HUD térben (kb 3.8 egység hosszúság)
                const targetLength = 3.8;
                const scaleFactor = targetLength / Math.max(size.x, size.y, size.z);
                
                const pivotGroup = new THREE.Group();
                pivotGroup.add(importedScene);
                pivotGroup.scale.setScalar(scaleFactor);

                // Hozzáadjuk a dőlésért felelős fő csoporthoz
                carModel.add(pivotGroup);
                
                document.getElementById('sys-status').innerText = "GRID_STATUS: ACTIVE // MODEL_RENDER: P38_GLB_HOLOGRAM";
            }, undefined, function (error) {
                console.error("Hiba történt a GLB betöltésekor:", error);
                document.getElementById('sys-status').innerText = "GRID_STATUS: ACTIVE // MODEL_RENDER: LOAD_ERROR";
            });

            scene.add(carModel);

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (controls) controls.update();

            // Végtelenített lineáris háttér-út mozgása hátrafelé
            linearGrid.position.z += driveSpeed;
            if (linearGrid.position.z >= 1.0) {
                linearGrid.position.z -= 1.0;
            }

            // Az autó alatti radar-gyűrű finom, sci-fi jellegű forgatása
            if (radarGrid) {
                radarGrid.rotation.y += 0.005;
            }

            // A BETÖLTÖTT MODELL + RADAR EGYÜTTES FIZIKAI DŐLÉSE (Lerp)
            carModel.rotation.x += (currentPitch - carModel.rotation.x) * 0.15;
            carModel.rotation.z += (currentRoll - carModel.rotation.z) * 0.15;

            renderer.render(scene, camera);
        }

        // Giroszkóp kalibráció és engedélyezés
        const startBtn = document.getElementById('start-btn');

        startBtn.addEventListener('click', function() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation, true);
                            isCalibrated = false;
                            startBtn.innerText = "RE-CALIBRATE HUD";
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleOrientation, true);
                isCalibrated = false;
                startBtn.innerText = "RE-CALIBRATE HUD";
            }
        });

        function handleOrientation(event) {
            let rawPitch = 0;
            let rawRoll = 0;

            // IPAD FEKVŐ (LANDSCAPE) MÓD KEZELÉSE
            if (window.orientation === 90) {
                rawPitch = -event.gamma;
                rawRoll = -event.beta;
            } else if (window.orientation === -90) {
                rawPitch = event.gamma;
                rawRoll = event.beta;
            } else {
                rawPitch = event.beta;
                rawRoll = event.gamma;
            }

            if (!isCalibrated) {
                basePitch = rawPitch;
                baseRoll = rawRoll;
                isCalibrated = true;
            }

            let finalPitch = rawPitch - basePitch;
            let finalRoll = rawRoll - baseRoll;

            document.getElementById('val-pitch').innerText = Math.round(finalPitch);
            document.getElementById('val-roll').innerText = Math.round(finalRoll);

            // Three.js radián átváltás
            currentPitch = finalPitch * (Math.PI / 180);
            currentRoll = finalRoll * (Math.PI / 180);
        }

        init3D();
    </script>
</body>
</html>
