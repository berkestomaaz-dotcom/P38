<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pure 3D Car Scene</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #02050d;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <script>
        const container = document.getElementById('canvas-container');

        // 3D Alapkörnyezet
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x02050d);
        scene.fog = new THREE.FogExp2(0x02050d, 0.005);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 25, 110);
        camera.lookAt(0, 4, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Interakció kezelése (Egér és Érintőképernyő)
        const touchState = { x: 0, y: 0, isTouching: false };

        function updateCoords(clientX, clientY) {
            touchState.x = (clientX / window.innerWidth) * 2 - 1;
            touchState.y = -(clientY / window.innerHeight) * 2 + 1;
        }

        window.addEventListener('touchstart', (e) => { touchState.isTouching = true; updateCoords(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
        window.addEventListener('touchmove', (e) => { if (touchState.isTouching) updateCoords(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
        window.addEventListener('touchend', () => { touchState.isTouching = false; touchState.x = 0; touchState.y = 0; }, { passive: true });

        window.addEventListener('mousedown', (e) => { touchState.isTouching = true; updateCoords(e.clientX, e.clientY); });
        window.addEventListener('mousemove', (e) => { if (touchState.isTouching) updateCoords(e.clientX, e.clientY); });
        window.addEventListener('mouseup', () => { touchState.isTouching = false; touchState.x = 0; touchState.y = 0; });

        // Neon rácsos padlózat
        const gridHelper = new THREE.GridHelper(300, 36, 0x00f3ff, 0x011526);
        gridHelper.position.y = -16;
        scene.add(gridHelper);

        // Fő konténer az autónak
        let carGroup = new THREE.Group();
        scene.add(carGroup);

        // Az autó felépítése geometriai alakzatokból
        function buildCyberCar() {
            const group = new THREE.Group();
            
            const wireMat = new THREE.MeshBasicMaterial({ color: 0x00f3ff, wireframe: true, transparent: true, opacity: 0.4 });
            const solidMat = new THREE.MeshBasicMaterial({ color: 0x030d1a, transparent: true, opacity: 0.25 });

            // Karosszéria alsó része
            const bodyGeo = new THREE.BoxGeometry(20, 5, 46);
            group.add(new THREE.Mesh(bodyGeo, solidMat), new THREE.Mesh(bodyGeo, wireMat));

            // Utastér / Kabin
            const cabinGeo = new THREE.BoxGeometry(15, 4.5, 25);
            cabinGeo.translate(0, 4.75, -2);
            group.add(new THREE.Mesh(cabinGeo, solidMat), new THREE.Mesh(cabinGeo, wireMat));

            // Kerekek
            const wheelGeo = new THREE.CylinderGeometry(4.5, 4.5, 4, 14);
            wheelGeo.rotateZ(Math.PI / 2);
            
            const wheelPositions = [
                [-10.5, -2, 14], [10.5, -2, 14],
                [-10.5, -2, -14], [10.5, -2, -14]
            ];
            
            wheelPositions.forEach(([x, y, z]) => {
                const wM = new THREE.Mesh(wheelGeo, solidMat); wM.position.set(x, y, z);
                const wW = new THREE.Mesh(wheelGeo, wireMat); wW.position.set(x, y, z);
                group.add(wM, wW);
            });

            group.position.y = 4;
            return group;
        }

        // Alsó neonfény textúra generálása
        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createLinearGradient(0, 256, 0, 0); 
            gradient.addColorStop(0, 'rgba(0, 243, 255, 1)');
            gradient.addColorStop(0.3, 'rgba(0, 243, 255, 0.4)');
            gradient.addColorStop(1, 'rgba(0, 243, 255, 0)');
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, 16, 256);
            return new THREE.CanvasTexture(canvas);
        }

        // Oldalsó neon fénycsíkok az alvázra
        let leftGlowPlane, rightGlowPlane;
        function setupNeonGlowPanels() {
            const glowGeo = new THREE.PlaneGeometry(46 * 0.8, 9 * 0.4); 
            const glowTex = createGlowTexture();
            const matLeft = new THREE.MeshBasicMaterial({ map: glowTex, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, side: THREE.DoubleSide });
            const matRight = matLeft.clone();

            leftGlowPlane = new THREE.Mesh(glowGeo, matLeft);
            leftGlowPlane.rotation.y = Math.PI / 2;
            leftGlowPlane.position.set(-10.5, -3, 0); 
            carGroup.add(leftGlowPlane);

            rightGlowPlane = new THREE.Mesh(glowGeo, matRight);
            rightGlowPlane.rotation.y = -Math.PI / 2;
            rightGlowPlane.position.set(10.5, -3, 0); 
            carGroup.add(rightGlowPlane);
        }

        // Objektumok inicializálása
        const cyberCar = buildCyberCar();
        carGroup.add(cyberCar);
        setupNeonGlowPanels();

        let targetRotX = 0;
        let targetRotZ = 0;
        let autoRotationY = 0;

        // Animációs ciklus
        function animate() {
            requestAnimationFrame(animate);

            if (touchState.isTouching) {
                // Interakció alatt követi a dőlést
                targetRotZ = -touchState.x * 0.22; 
                targetRotX = -touchState.y * 0.18;
            } else {
                // Elengedéskor visszaáll és lágyan forog
                targetRotZ = 0; 
                targetRotX = 0;
                autoRotationY += 0.005; 
                carGroup.rotation.y = autoRotationY;
            }

            // Sima fizikai mozgás (Lerp)
            carGroup.rotation.z = THREE.MathUtils.lerp(carGroup.rotation.z, targetRotZ, 0.08);
            carGroup.rotation.x = THREE.MathUtils.lerp(carGroup.rotation.x, targetRotX, 0.08);

            // Neonfény intenzitás változtatása a dőlésszög függvényében
            let currentTiltZ = carGroup.rotation.z;
            leftGlowPlane.material.opacity = THREE.MathUtils.clamp(Math.max(0, -currentTiltZ * 3.5), 0, 0.75);
            rightGlowPlane.material.opacity = THREE.MathUtils.clamp(Math.max(0, currentTiltZ * 3.5), 0, 0.75);

            renderer.render(scene, camera);
        }

        // Ablakméret változás követése
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
