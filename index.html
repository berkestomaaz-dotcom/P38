<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P38 CyberSloyd Inclinometer v5</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0a0512;
            font-family: 'Courier New', Courier, monospace;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* CRT TV SCANLINE OVERLAY */
        #crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.35) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            z-index: 20;
        }

        /* SLOYD 3D MODELL CONTAINER (A Giroszkóp ezt fogja dönteni a térben) */
        #gauge-perspective-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            perspective: 1200px; /* Megadja a 3D mélységet a döntéshez */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            pointer-events: none;
        }
        #sloyd-container {
            width: 85vw;
            height: 60vw;
            max-width: 500px;
            max-height: 375px;
            border: 2px solid #00ffff;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4), inset 0 0 20px rgba(0, 255, 255, 0.2);
            border-radius: 8px;
            background-color: #000000;
            overflow: hidden;
            pointer-events: auto; /* Így az iframe-en belül tudsz babrálni a modellel */
            transform: translateZ(0); /* Hardveres gyorsítás kényszerítése */
            will-change: transform;
        }
        #sloyd-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }
        .btn {
            background: rgba(10, 5, 18, 0.9);
            color: #ff007f;
            border: 2px solid #ff007f;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            font-family: inherit;
            border-radius: 4px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            transition: all 0.2s ease;
            align-self: center;
            letter-spacing: 2px;
        }
        .btn:active {
            transform: scale(0.95);
            background: #ff007f;
            color: #0a0512;
        }
        #telemetry {
            display: flex;
            justify-content: space-between;
            width: 100%;
            color: #00ffff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.6);
        }
        .angle-box {
            background: rgba(10, 5, 18, 0.8);
            padding: 10px 15px;
            border-radius: 4px;
            border: 1px solid #00ffff;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="crt-overlay"></div>
    <div id="canvas-container"></div>

    <!-- Ide ágyaztuk be a külső Sloyd 3D ablakot -->
    <div id="gauge-perspective-wrapper">
        <div id="sloyd-container">
            <iframe src="https://app.sloyd.ai/embed/w7pjyv8t?width=800&height=600&fullscreen=true&mode=deferred"></iframe>
        </div>
    </div>

    <div id="ui-layer">
        <div id="telemetry">
            <div class="angle-box">SYS.ROLL // DŐLÉS: <span id="val-roll">0</span>°</div>
            <div class="angle-box">SYS.PITCH // BÓLINTÁS: <span id="val-pitch">0</span>°</div>
        </div>

        <button id="start-btn" class="btn">INITIALIZE CORE</button>
    </div>

    <script>
        let scene, camera, renderer, gridHelper;
        let basePitch = 0, baseRoll = 0;
        let isCalibrated = false;
        const driveSpeed = 0.15; 

        // 3D Neon rács háttér inicializálása
        function initBackgroundGrid() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0512);
            scene.fog = new THREE.FogExp2(0x0a0512, 0.08);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 3, 7);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            gridHelper = new THREE.GridHelper(100, 80, 0xff007f, 0x330033);
            gridHelper.position.y = -1.2; // Kicsit lejjebb toljuk a rácsot, hogy szebb legyen a perspektíva
            scene.add(gridHelper);

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Végtelenített neon út mozgása
            gridHelper.position.z += driveSpeed;
            if (gridHelper.position.z >= 1.0) {
                gridHelper.position.z -= 1.0;
            }

            renderer.render(scene, camera);
        }

        // Giroszkóp adatok leképezése a HTML/CSS Kiber-műszerfalra
        const startBtn = document.getElementById('start-btn');
        const sloydContainer = document.getElementById('sloyd-container');

        startBtn.addEventListener('click', function() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation, true);
                            isCalibrated = false;
                            startBtn.innerText = "RESET SYSTEM";
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleOrientation, true);
                isCalibrated = false;
                startBtn.innerText = "RESET SYSTEM";
            }
        });

        function handleOrientation(event) {
            let rawPitch = 0;
            let rawRoll = 0;

            if (window.orientation === 90) {
                rawPitch = -event.gamma;
                rawRoll = -event.beta;
            } else if (window.orientation === -90) {
                rawPitch = event.gamma;
                rawRoll = event.beta;
            } else {
                rawPitch = event.beta;
                rawRoll = event.gamma;
            }

            if (!isCalibrated) {
                basePitch = rawPitch;
                baseRoll = rawRoll;
                isCalibrated = true;
            }

            let finalPitch = rawPitch - basePitch;
            let finalRoll = rawRoll - baseRoll;

            document.getElementById('val-pitch').innerText = Math.round(finalPitch);
            document.getElementById('val-roll').innerText = Math.round(finalRoll);

            // CSS 3D TRANSZFORMÁCIÓ: A teljes beágyazott Sloyd panelt elforgatjuk a térben
            // Pitch (bólintás) = X tengely körüli forgás
            // Roll (oldaldőlés) = Z tengely körüli forgás
            // A mínusz jelek azért kellenek, hogy a dőlés iránya megegyezzen a fizikai mozgással
            sloydContainer.style.transform = `rotateX(${-finalPitch}deg) rotateZ(${-finalRoll}deg)`;
        }

        initBackgroundGrid();
    </script>
</body>
</html>
