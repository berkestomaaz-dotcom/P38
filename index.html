<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiosk Touch Interface - Range Rover 1998</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-orange: #ff5500;
            --bg-dark: #030712;
            --panel-alpha: rgba(5, 11, 20, 0.85);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Share Tech Mono', monospace;
            color: var(--neon-cyan);
            user-select: none;
            touch-action: none;
        }

        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            z-index: 10;
            pointer-events: none;
        }

        #canvas-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .hud-panel {
            position: absolute;
            z-index: 5;
            background: var(--panel-alpha);
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            padding: 15px;
        }

        .tech-frame {
            clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 15px, 100% 100%, 15px 100%, 0 calc(100% - 15px));
        }

        #hud-header {
            top: 20px; left: 20px; right: 20px; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; font-family: 'Orbitron', sans-serif;
            border-bottom: 3px solid var(--neon-cyan);
        }

        .system-status {
            color: var(--neon-cyan);
            animation: blink 2s infinite;
        }

        #hud-left {
            top: 110px; left: 20px; width: 280px; bottom: 40px;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        #hud-right {
            top: 110px; right: 20px; width: 300px; bottom: 40px;
        }

        .data-stream {
            font-size: 13px; line-height: 1.6;
            border-left: 2px solid var(--neon-cyan);
            padding-left: 10px; margin-bottom: 15px;
        }

        .crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; height: 120px;
            border: 1px dashed rgba(0, 243, 255, 0.2);
            border-radius: 50%;
            pointer-events: none; z-index: 2;
        }

        #loading-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            text-align: center;
            pointer-events: none;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
</head>
<body>

    <div class="crt-overlay"></div>
    <div class="crosshair"></div>

    <div id="loading-overlay">DRACO MÁTRIX DEKÓDOLÁSA...</div>

    <div id="hud-header" class="hud-panel tech-frame">
        <div style="font-size: 20px; font-weight: bold;">M-ENGINE // RANGE ROVER 1998</div>
        <div id="global-status" class="system-status">● DIAGNOSTICS ONLINE</div>
    </div>

    <div id="hud-left" class="hud-panel tech-frame">
        <div>
            <h3 style="color: var(--neon-orange); margin-top:0;">TELEMETRIA</h3>
            <div class="data-stream">
                DŐLÉSSZÖG X: <span id="tilt-x">0.00°</span><br>
                DŐLÉSSZÖG Z: <span id="tilt-z">0.00°</span>
            </div>
